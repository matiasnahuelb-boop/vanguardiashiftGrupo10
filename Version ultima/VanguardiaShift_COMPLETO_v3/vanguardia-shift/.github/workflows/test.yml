# .github/workflows/test.yml
# Pipeline CI/CD para VanguardiaShift — Backend Laravel
# Se activa en cada push/PR a main o develop.
# Si todos los tests pasan, el código puede integrarse.

name: CI — Tests VanguardiaShift Backend

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: PHP ${{ matrix.php-version }} — Feature Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.2']

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: 🐘 Configurar PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, bcmath, pdo, pdo_sqlite, sqlite3, xml, json
          coverage: none
        env:
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 💾 Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php${{ matrix.php-version }}-${{ hashFiles('**/composer.lock') }}

      - name: 📦 Instalar dependencias
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: ⚙️ Configurar entorno de testing
        run: |
          cp .env.example .env
          echo "DB_CONNECTION=sqlite"  >> .env
          echo "DB_DATABASE=:memory:"  >> .env
          echo "APP_ENV=testing"        >> .env

      - name: 🔑 Generar Application Key
        run: php artisan key:generate

      - name: 🗃️ Ejecutar migraciones (SQLite en memoria)
        run: php artisan migrate --force
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

      - name: 🧪 Ejecutar 6 tests PHPUnit
        run: php artisan test --parallel
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          APP_ENV: testing

