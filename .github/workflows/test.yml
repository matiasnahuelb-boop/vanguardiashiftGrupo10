name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Instalar dependencias PHP
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-security-blocking

      - name: Configurar entorno de testing
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Ejecutar migraciones
        run: php artisan migrate --force
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          APP_ENV: testing

      - name: Ejecutar los 6 tests
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          APP_ENV: testing
