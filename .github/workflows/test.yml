name: CI — Tests VanguardiaShift Backend

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: PHP 8.2 — Feature Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo, pdo_sqlite, sqlite3, xml, json
          coverage: none

      - name: Instalar dependencias
        run: cd backend && composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts --no-security-blocking

      - name: Configurar entorno de testing
        run: |
          cd backend
          cp .env.example .env
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=:memory:" >> .env
          echo "APP_ENV=testing" >> .env

      - name: Generar Application Key
        run: cd backend && php artisan key:generate

      - name: Ejecutar migraciones
        run: cd backend && php artisan migrate --force
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

      - name: Ejecutar tests
        run: cd backend && php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          APP_ENV: testing
