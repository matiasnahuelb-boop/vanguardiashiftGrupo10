name: Tests

on:
  push:
    branches: [main]

jobs:
  verificar-estructura:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Verificar estructura del proyecto
        run: |
          echo "=== Estructura del backend ==="
          ls -la backend/
          echo ""
          echo "=== Controllers ==="
          ls -la backend/app/Http/Controllers/
          echo ""
          echo "=== Tests disponibles ==="
          ls -la backend/tests/Feature/
          echo ""
          echo "=== Migraciones ==="
          ls -la backend/database/migrations/
          echo ""
          echo "=== Frontend ==="
          ls -la frontend/src/components/ 2>/dev/null || echo "Frontend no encontrado"
      
      - name: Validar sintaxis PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      
      - name: Verificar sintaxis de archivos PHP
        run: |
          php -l backend/app/Http/Controllers/TurnoController.php
          php -l backend/app/Http/Controllers/AuthController.php
          php -l backend/app/Http/Controllers/ProfesionalController.php
